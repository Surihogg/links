<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>全局搜索</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        height: 100%;
        width: 100%;
        background: transparent;
      }
      /* opacity:0 配合 themeStore.init 后给 <html> 加 theme-ready 类，
         避免主题首屏闪白 */
      #app {
        height: 100%;
        background: transparent;
        overflow: hidden;
        opacity: 0;
      }
      html.theme-ready #app {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/spotlight.js"></script>
  </body>
</html>
