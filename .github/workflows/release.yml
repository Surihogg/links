name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - run: npm install

      - name: 生成 Release Notes
        id: notes
        shell: bash
        run: |
          # 从 GITHUB_REF 获取当前 tag 名（tag push 触发时为 refs/tags/vX.Y.Z）
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          # 取版本号仅次于当前 tag 的上一个 tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -1)

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
            echo "📝 生成 ${PREV_TAG}..HEAD 的 Release Notes"
          else
            RANGE="HEAD~30..HEAD"
            echo "📝 未找到历史 tag，取最近 30 条提交"
          fi

          # 获取提交信息（过滤 merge commit 和 version bump）
          COMMITS=$(git log "$RANGE" --pretty=format:"%s" --no-merges | grep -v "^chore: bump version" || true)

          if [ -z "$COMMITS" ]; then
            echo "body=见下方附件下载安装。" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 按类型分类
          FEAT=$(echo "$COMMITS" | grep "^feat:" | sed 's/^feat: /- /') || true
          FIX=$(echo "$COMMITS" | grep "^fix:" | sed 's/^fix: /- /') || true
          DOCS=$(echo "$COMMITS" | grep "^docs:" | sed 's/^docs: /- /') || true
          OTHER=$(echo "$COMMITS" | grep -vE "^(feat|fix|docs|chore):" | sed 's/^/- /') || true

          BODY=""
          if [ -n "$FEAT" ]; then
            BODY="${BODY}## ✨ 新功能\n${FEAT}\n\n"
          fi
          if [ -n "$FIX" ]; then
            BODY="${BODY}## 🐛 修复\n${FIX}\n\n"
          fi
          if [ -n "$DOCS" ]; then
            BODY="${BODY}## 📝 文档\n${DOCS}\n\n"
          fi
          if [ -n "$OTHER" ]; then
            BODY="${BODY}## 📦 其他变更\n${OTHER}\n\n"
          fi

          BODY="${BODY}---\n见下方附件下载安装。"

          # 多行输出到 GITHUB_OUTPUT
          {
            echo "body<<RELEASE_NOTES_EOF"
            printf "%b" "$BODY"
            echo ""
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Links v__VERSION__"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: 上传浏览器扩展
        if: matrix.platform == 'windows-latest'
        continue-on-error: true
        shell: bash
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          cd browser-extension
          7z a -tzip "../links-browser-extension-v${VERSION}.zip" .
          cd ..
          gh release upload "v${VERSION}" "links-browser-extension-v${VERSION}.zip" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
